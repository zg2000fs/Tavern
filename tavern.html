const DW = 1920, DH = 1080;
canvas.width = DW; canvas.height = DH;
let _scale = 1, _ox = 0, _oy = 0;
function resize(){
  _scale = Math.min(innerWidth/DW, innerHeight/DH);
  const cw = DW*_scale, ch = DH*_scale;
  _ox = (innerWidth-cw)/2|0; _oy = (innerHeight-ch)/2|0;
  Object.assign(canvas.style,{left:_ox+'px',top:_oy+'px',width:cw+'px',height:ch+'px'});
}
window.addEventListener('resize', resize); resize();
function toWorld(cx,cy){ return {x:(cx-_ox)/_scale, y:(cy-_oy)/_scale}; }

   SPRITE SYSTEM — load real sprites or draw fallback
═══════════════════════════════════════════ */

// Strip white/near-white bg from a source canvas, return new RGBA canvas
function stripWhiteBG(src){
  const tmp = document.createElement('canvas');
  tmp.width = src.width; tmp.height = src.height;
  const tc = tmp.getContext('2d');
  tc.drawImage(src,0,0);
  const id = tc.getImageData(0,0,tmp.width,tmp.height);
  const d = id.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    const mn=Math.min(r,g,b), mx=Math.max(r,g,b);
    // White bg: very bright and low saturation
    // Gray bg: medium brightness and low saturation (spec said ~153-220)
    const bright = (r+g+b)/3;
    if((mx-mn)<=18 && bright>=125){
      // Feather edges: partial alpha for anti-aliasing zone (220-255 brightness)
      if(bright >= 220){
        d[i+3] = 0;
      } else {
        // Soft edge zone 125-220 → alpha 0-180
        d[i+3] = Math.max(0, Math.round((220-bright)/95 * 180));
      }
    }
  }
  tc.putImageData(id,0,0);
  return tmp;
}

// Auto-crop to content bbox, add 6px pad
function autocrop(src, pad=6){
  const tc = src.getContext('2d');
  const id = tc.getImageData(0,0,src.width,src.height);
  const d = id.data;
  let minX=src.width,minY=src.height,maxX=0,maxY=0;
  for(let y=0;y<src.height;y++) for(let x=0;x<src.width;x++){
    if(d[(y*src.width+x)*4+3]>10){
      if(x<minX)minX=x; if(x>maxX)maxX=x;
      if(y<minY)minY=y; if(y>maxY)maxY=y;
    }
  }
  if(maxX<minX) return src;
  const oc = document.createElement('canvas');
  oc.width = (maxX-minX+1)+pad*2;
  oc.height = (maxY-minY+1)+pad*2;
  oc.getContext('2d').drawImage(src, minX, minY, maxX-minX+1, maxY-minY+1, pad, pad, maxX-minX+1, maxY-minY+1);
  return oc;
}

// Procedural fallback sprite for one agent def
function makeProceduralSprite(def){
  const SW=38,SH=56;
  function drawFrame(f){
    const fc=document.createElement('canvas'); fc.width=SW; fc.height=SH;
    const c=fc.getContext('2d');
    const legL=[0,5,0,-5][f%4], legR=[0,-5,0,5][f%4];
    const arm=[0,3,0,-3][f%4], bob=[0,1,0,-1][f%4];
    const cx=SW/2, by=13+bob;
    // Shadow
    c.fillStyle='rgba(0,0,0,0.3)';
    c.beginPath(); c.ellipse(cx,by+30,14,5,0,0,Math.PI*2); c.fill();
    // Legs
    c.strokeStyle='#1e1630'; c.lineWidth=6; c.lineCap='round';
    c.beginPath(); c.moveTo(cx-3,by+23); c.lineTo(cx-3+legL,by+34); c.stroke();
    c.beginPath(); c.moveTo(cx+3,by+23); c.lineTo(cx+3+legR,by+34); c.stroke();
    // Boots
    c.fillStyle='#12101a';
    c.beginPath(); c.roundRect(cx-3+legL-3,by+31,8,6,2); c.fill();
    c.beginPath(); c.roundRect(cx+3+legR-3,by+31,8,6,2); c.fill();
    // Body
    c.fillStyle=def.c1;
    c.beginPath(); c.roundRect(cx-8,by+7,16,17,3); c.fill();
    // Trim
    c.fillStyle=def.accent;
    c.fillRect(cx-8,by+7,16,3);
    // Arms
    c.strokeStyle=def.c1; c.lineWidth=4;
    c.beginPath(); c.moveTo(cx-8,by+9); c.lineTo(cx-12,by+17+arm); c.stroke();
    c.beginPath(); c.moveTo(cx+8,by+9); c.lineTo(cx+12,by+17-arm); c.stroke();
    // Skin
    const skin=['#f0d0a0','#d4c8b0','#e8c880','#e8d890','#ddd0c8'][def.id];
    c.fillStyle=skin; c.beginPath(); c.arc(cx,by+5,7,0,Math.PI*2); c.fill();
    // Eyes
    c.fillStyle='#1a1020';
    c.beginPath(); c.arc(cx-2.5,by+4.5,1.2,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(cx+2.5,by+4.5,1.2,0,Math.PI*2); c.fill();
    // Per-character hat/accessory
    switch(def.id){
      case 0: // wizard hat
        c.fillStyle=def.c1;
        c.beginPath(); c.moveTo(cx-9,by+0); c.lineTo(cx+9,by+0); c.lineTo(cx,by-16); c.closePath(); c.fill();
        c.fillStyle=def.accent; c.fillRect(cx-9,by-1,18,3);
        c.strokeStyle='#7a6030'; c.lineWidth=2;
        c.beginPath(); c.moveTo(cx+13,by+5); c.lineTo(cx+13,by+36); c.stroke();
        c.fillStyle=def.accent; c.beginPath(); c.arc(cx+13,by+4,3,0,Math.PI*2); c.fill();
        break;
      case 1: // hood
        c.fillStyle=def.c1;
        c.beginPath(); c.arc(cx,by+3,9,Math.PI,0); c.fill();
        c.fillStyle=def.accent;
        c.beginPath(); c.ellipse(cx-10,by+1,3,5,-0.4,0,Math.PI*2); c.fill();
        c.beginPath(); c.ellipse(cx+10,by+1,3,5,0.4,0,Math.PI*2); c.fill();
        break;
      case 2: // goggles
        c.fillStyle='#c08020';
        c.beginPath(); c.arc(cx-3,by+3.5,2.8,0,Math.PI*2); c.fill();
        c.beginPath(); c.arc(cx+3,by+3.5,2.8,0,Math.PI*2); c.fill();
        c.fillStyle='#3a2208'; c.fillRect(cx-6,by+3,12,2);
        c.fillStyle='#b07820';
        c.beginPath(); c.arc(cx,by-2,7,Math.PI*1.1,Math.PI*1.9); c.fill();
        break;
      case 3: // bun
        c.fillStyle='#d4a824';
        c.beginPath(); c.arc(cx,by-2,6,Math.PI,0); c.fill();
        c.beginPath(); c.arc(cx+4,by-6,3,0,Math.PI*2); c.fill();
        c.fillStyle=def.accent+'80';
        c.beginPath(); c.arc(cx-13,by+14+arm,4,0,Math.PI*2); c.fill();
        c.strokeStyle=def.accent; c.lineWidth=1;
        c.beginPath(); c.arc(cx-13,by+14+arm,4,0,Math.PI*2); c.stroke();
        break;
      case 4: // helmet
        c.fillStyle=def.c1;
        c.beginPath(); c.roundRect(cx-9,by-4,18,11,2); c.fill();
        c.fillStyle=def.accent; c.fillRect(cx-8,by-4,16,3);
        c.fillStyle='rgba(0,0,0,0.55)'; c.fillRect(cx-6,by+0,12,4);
        c.fillStyle=def.c1;
        c.beginPath(); c.ellipse(cx-11,by+7,5,4,0.3,0,Math.PI*2); c.fill();
        c.beginPath(); c.ellipse(cx+11,by+7,5,4,-0.3,0,Math.PI*2); c.fill();
        break;
    }
    return fc;
  }
  const frames=[0,1,2,3].map(f=>drawFrame(f));
  return {frames, idle:frames[0], SW, SH, isReal:false};
}

// Real image sprite: given a loaded <img> of the full strip, slice one character
function makeRealSprite(img, index, totalCount){
  const sliceW = img.naturalWidth / totalCount;
  // Draw slice to temp canvas
  const tmp = document.createElement('canvas');
  tmp.width = sliceW; tmp.height = img.naturalHeight;
  tmp.getContext('2d').drawImage(img, -index*sliceW, 0);
  // Strip bg
  const stripped = stripWhiteBG(tmp);
  // Crop
  const cropped = autocrop(stripped, 6);
  // Scale to ~3x for crisp display (~120px tall)
  const targetH = 140;
  const scale = targetH / cropped.height;
  const SW = Math.round(cropped.width * scale);
  const SH = Math.round(cropped.height * scale);
  const scaled = document.createElement('canvas');
  scaled.width = SW; scaled.height = SH;
  const sc = scaled.getContext('2d');
  sc.imageSmoothingEnabled = false;
  sc.drawImage(cropped, 0, 0, SW, SH);
  // For real sprites we only have one frame (idle) — animate by bobbing
  return {frames:[scaled,scaled,scaled,scaled], idle:scaled, SW, SH, isReal:true};
}

/* ═══════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════ */
class P {
  constructor(type){ this.type=type; this.reset(); }
  reset(){
    const t=this.type;
    if(t==='ember'){
      this.x=FIRE.cx+(Math.random()-0.5)*50; this.y=FIRE.cy+10;
      this.vx=(Math.random()-0.5)*30; this.vy=-(Math.random()*100+50);
      this.life=1; this.tl=Math.random()*1.8+0.8; this.r=Math.random()*2.5+1;
    } else if(t==='firefly'){
      this.x=Math.random()*1400+250; this.y=Math.random()*450+280;
      this.vx=(Math.random()-0.5)*25; this.vy=(Math.random()-0.5)*18;
      this.ph=Math.random()*Math.PI*2; this.r=Math.random()*2.5+1;
    } else if(t==='dust'){
      this.x=Math.random()*DW; this.y=Math.random()*(FLOOR_TOP-100)+100;
      this.vx=(Math.random()-0.5)*6; this.vy=Math.random()*3-1;
      this.a=Math.random()*0.25+0.04; this.r=Math.random()*1.5+0.3;
    } else if(t==='spark'){
      this.x=STA.BENCH.x+(Math.random()-0.5)*50; this.y=STA.BENCH.y-20;
      this.vx=(Math.random()-0.5)*140; this.vy=-(Math.random()*90+20);
      this.life=1; this.tl=Math.random()*0.5+0.15; this.r=Math.random()*2+0.8;
    } else if(t==='rune'){
      this.ph=Math.random()*Math.PI*2; this.r=Math.random()*3+1.5;
      this.spd=Math.random()*0.3+0.5;
    }
  }
  update(dt,T){
    const t=this.type;
    if(t==='ember'){
      this.x+=this.vx*dt; this.y+=this.vy*dt;
      this.vx+=(Math.random()-0.5)*40*dt; this.vy+=10*dt;
      this.life-=dt/this.tl; if(this.life<=0)this.reset();
    } else if(t==='firefly'){
      this.x+=this.vx*dt; this.y+=this.vy*dt;
      this.vx+=(Math.random()-0.5)*45*dt; this.vy+=(Math.random()-0.5)*35*dt;
      this.vx=Math.max(-40,Math.min(40,this.vx)); this.vy=Math.max(-30,Math.min(30,this.vy));
      if(this.x<200||this.x>1750){this.vx*=-1;}
      if(this.y<260||this.y>680){this.vy*=-1;}
      this.ph+=dt*1.8;
    } else if(t==='dust'){
      this.x+=this.vx*dt; this.y+=this.vy*dt;
      if(this.x<0||this.x>DW||this.y<0||this.y>FLOOR_TOP)this.reset();
    } else if(t==='spark'){
      this.x+=this.vx*dt; this.y+=this.vy*dt;
      this.vy+=280*dt; this.life-=dt/this.tl; if(this.life<=0)this.reset();
    } else if(t==='rune'){
      this.ph+=dt*this.spd;
    }
  }
  draw(ctx,T){
    const t=this.type;
    if(t==='ember'){
      const a=Math.max(0,this.life);
      ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=a*0.85;
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*3);
      g.addColorStop(0,'rgba(255,240,150,1)'); g.addColorStop(0.4,'rgba(255,120,20,0.8)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(this.x,this.y,this.r*3,0,Math.PI*2); ctx.fill();
      ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
    } else if(t==='firefly'){
      const b=Math.sin(T*1.8+this.ph)*0.5+0.5;
      ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=b*0.75;
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,10);
      g.addColorStop(0,'rgba(160,255,80,1)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(this.x,this.y,10,0,Math.PI*2); ctx.fill();
      ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
    } else if(t==='dust'){
      ctx.globalAlpha=this.a;
      ctx.fillStyle='rgba(200,185,155,0.6)';
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    } else if(t==='spark'){
      const a=Math.max(0,this.life);
      ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=a;
      ctx.fillStyle='#ffb030';
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
      ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
    }
  }
}

/* ═══════════════════════════════════════════
   AGENT CLASS
═══════════════════════════════════════════ */
class Agent {
  constructor(def, sp){
    this.def=def; this.sp=sp;
    const s=STA[def.station];
    this.x=s.x; this.y=s.y; this.tx=s.x; this.ty=s.y;
    this.state='working'; this.facing=1;
    this.frame=0; this.frameT=0;
    this.stT=Math.random()*4+3;
    this.emote=EMOTES[0|Math.random()*EMOTES.length];
    this.emoteT=Math.random()*1.2+1.2;
    this.chatTarget=null; this.priorSta=def.station;
    this.bobT=0; this.bob=0;
    this._afterWalk=null; this.prevState='working';
    const sh=[...def.tasks];
    this.done=sh.slice(0,2); this.active=sh.slice(2,4); this.queued=sh.slice(4);
    this.prog=[Math.random()*50+20, Math.random()*30+5];
    this.uptime='99.'+((Math.random()*9+1|0))+'%';
    this.completed=Math.floor(Math.random()*140+50);
    this.drinkT=Math.random()*10+8;
  }
  update(dt, agents, T){
    if(this.state==='dragged') return;
    // Task progress
    if(this.state==='working'){
      this.prog[0]=Math.min(100,this.prog[0]+dt*3.5);
      if(this.prog[0]>=100){
        this.done.unshift(this.active[0]); if(this.done.length>3)this.done.pop();
        this.active[0]=this.queued.shift()||this.def.tasks[0|Math.random()*this.def.tasks.length];
        this.queued.push(this.def.tasks[0|Math.random()*this.def.tasks.length]);
        this.prog[0]=Math.random()*8; this.prog[1]=Math.random()*20; this.completed++;
      }
      if(this.prog[1]<100) this.prog[1]=Math.min(100,this.prog[1]+dt*2);
      this.bobT+=dt; this.bob=Math.sin(this.bobT*2.2)*1.8;
      // Emote cycle
      this.emoteT-=dt;
      if(this.emoteT<=0){ this.emote=EMOTES[0|Math.random()*EMOTES.length]; this.emoteT=Math.random()*1.0+1.2; }
    }
    this.stT-=dt;
    switch(this.state){
      case 'working':
        if(this.stT<=0){
          this.drinkT-=dt;
          if(this.drinkT<=0 && Math.random()<0.25){
            this.drinkT=Math.random()*10+8;
            this.priorSta=this.def.station;
            this._go(STA.BAR.x+(Math.random()-0.5)*50, STA.BAR.y, 'drinking');
          } else if(Math.random()<0.6){
            const near=agents.filter(a=>a!==this&&a.state!=='dragged'&&a.state!=='chatting'&&dist(this,a)<180);
            if(near.length){
              const p=near[0|Math.random()*near.length];
              this.chatTarget=p; this.priorSta=this.def.station;
              this.state='chatting'; this.stT=Math.random()*3+2;
              const mx=(this.x+p.x)/2, my=(this.y+p.y)/2;
              this.tx=mx; this.ty=my;
              p.chatTarget=this; p.priorSta=p.def.station;
              p.state='chatting'; p.stT=Math.random()*3+2;
              p.tx=mx+35; p.ty=my;
            } else { this.stT=Math.random()*5+3; }
          } else { this.stT=Math.random()*5+3; }
        }
        break;
      case 'walking':{
        const dx=this.tx-this.x, dy=this.ty-this.y, d2=Math.sqrt(dx*dx+dy*dy);
        if(d2<5){
          this.x=this.tx; this.y=this.ty;
          if(this._afterWalk==='drinking'){ this.state='drinking'; this.stT=Math.random()*1.5+2.5; this._afterWalk=null; }
          else if(this._afterWalk==='return'){ this.state='working'; this.stT=Math.random()*5+3; this._afterWalk=null; }
          else { this.state='working'; this.stT=Math.random()*5+3; }
        } else {
          const spd=110;
          this.x+=dx/d2*spd*dt; this.y+=dy/d2*spd*dt;
          this.facing=dx>0?1:-1;
          this.frameT+=dt; if(this.frameT>0.11){this.frame=(this.frame+1)%4;this.frameT=0;}
        }
        break;
      }
      case 'drinking':
        if(this.stT<=0){ this._go(STA[this.priorSta].x, STA[this.priorSta].y, 'return'); }
        break;
      case 'chatting':
        if(this.chatTarget) this.facing=this.chatTarget.x>this.x?1:-1;
        if(this.stT<=0){
          this.chatTarget=null; this.state='walking'; this._afterWalk='return';
          this.tx=STA[this.priorSta].x; this.ty=STA[this.priorSta].y;
        }
        break;
    }
  }
  _go(tx,ty,after){ this.state='walking'; this.tx=tx; this.ty=ty; this._afterWalk=after; }

  draw(ctx, T){
    const {SW,SH,frames,idle,isReal}=this.sp;
    const accent=this.def.accent;
    const frame=this.state==='walking'?frames[this.frame]:idle;
    // Y-render anchor: feet at this.y
    const sx=this.x-SW/2, sy=this.y-SH+8;
    const bobY=this.state==='working'?this.bob:0;

    // Floor aura (lighter blend)
    ctx.globalCompositeOperation='lighter';
    const aura=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,80);
    aura.addColorStop(0,accent+'38'); aura.addColorStop(0.6,accent+'10'); aura.addColorStop(1,'transparent');
    ctx.fillStyle=aura; ctx.beginPath(); ctx.ellipse(this.x,this.y,80,30,0,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='source-over';

    // Ground shadow
    ctx.fillStyle='rgba(0,0,0,0.32)';
    ctx.beginPath(); ctx.ellipse(this.x,this.y+3,SW*0.42,7,0,0,Math.PI*2); ctx.fill();

    // Dark halo behind sprite
    const halo=ctx.createRadialGradient(this.x,sy+SH*0.45,0,this.x,sy+SH*0.45,SH*0.65);
    halo.addColorStop(0,'rgba(0,0,0,0.38)'); halo.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=halo;
    ctx.beginPath(); ctx.ellipse(this.x,sy+SH*0.45+bobY,SW*0.62,SH*0.55,0,0,Math.PI*2); ctx.fill();

    // 4-direction black outline
    ctx.save();
    ctx.filter='brightness(0) opacity(0.85)';
    for(const [ox,oy] of [[-2,0],[2,0],[0,-2],[0,2]]){
      if(this.facing<0){
        ctx.save(); ctx.translate((sx+SW)*2,0); ctx.scale(-1,1);
        ctx.drawImage(frame,-sx-SW+ox,sy+oy+bobY,SW,SH); ctx.restore();
      } else {
        ctx.drawImage(frame,sx+ox,sy+oy+bobY,SW,SH);
      }
    }
    ctx.restore();

    // Main sprite with post-process
    ctx.save();
    ctx.filter='brightness(1.12) contrast(1.08) saturate(1.18)';
    if(this.facing<0){
      ctx.save(); ctx.translate((sx+SW)*2,0); ctx.scale(-1,1);
      ctx.drawImage(frame,-sx-SW,sy+bobY,SW,SH); ctx.restore();
    } else {
      ctx.drawImage(frame,sx,sy+bobY,SW,SH);
    }
    ctx.restore();

    // Rim glow overlay
    ctx.globalCompositeOperation='lighter';
    const rim=ctx.createRadialGradient(this.x,sy+SH*0.38,SH*0.1,this.x,sy+SH*0.38,SH*0.55);
    rim.addColorStop(0.6,'rgba(0,0,0,0)');
    rim.addColorStop(0.82,accent+'28');
    rim.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rim;
    ctx.beginPath(); ctx.ellipse(this.x,sy+SH*0.38+bobY,SW*0.6,SH*0.52,0,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='source-over';

    // Emote bubble (working state)
    if(this.state==='working'||this.state==='chatting'){
      const ex=this.x, ey=sy-10+bobY;
      ctx.fillStyle='rgba(6,4,16,0.82)';
      ctx.beginPath(); ctx.roundRect(ex-17,ey-23,34,27,8); ctx.fill();
      ctx.strokeStyle=accent+'44'; ctx.lineWidth=1; ctx.stroke();
      // tail
      ctx.fillStyle='rgba(6,4,16,0.82)';
      ctx.beginPath(); ctx.moveTo(ex-4,ey+4); ctx.lineTo(ex+4,ey+4); ctx.lineTo(ex,ey+10); ctx.closePath(); ctx.fill();
      ctx.font='16px serif'; ctx.textAlign='center'; ctx.globalAlpha=0.92;
      const chatEmotes=['💬','😄','🤔','🗣️'];
      ctx.fillText(this.state==='chatting'?chatEmotes[(T*2|0)%chatEmotes.length]:this.emote, ex, ey);
      ctx.globalAlpha=1;
    }

    // Name label
    ctx.font='bold 10px monospace'; ctx.textAlign='center';
    ctx.fillStyle=accent; ctx.globalAlpha=0.75;
    ctx.fillText(this.def.name, this.x, sy-30);
    ctx.globalAlpha=1;
  }
}
function dist(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy);}

    const lg2=c.createRadialGradient(lx2,ly2,0,lx2,ly2,90);
    lg2.addColorStop(0,'rgba(255,170,50,0.22)'); lg2.addColorStop(1,'transparent');
    c.fillStyle=lg2; c.beginPath(); c.arc(lx2,ly2,90,0,Math.PI*2); c.fill();
    c.globalCompositeOperation='source-over';
  }
  for(const[lx2,ly2] of [[380,240],[760,200],[1160,175],[1550,220],[1840,195]]) lantern(lx2,ly2);

  bgReady=true;
}

// Attempt to load real bg image
function loadBG(){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      bgCtx.drawImage(img,0,0,DW,DH);
      bgReady=true; res(true);
    };
    img.onerror=()=>{ renderProceduralBG(bgCtx); res(false); };
    img.src='tavern-bg.png';
  });
}

// Attempt to load character sprites
function loadSprites(){
  return new Promise(res=>{
    // First try pre-sliced agent_0..4.png
    let loaded=0;
    const sps=new Array(5).fill(null);
    function tryPresliced(){
      let count=0;
      for(let i=0;i<5;i++){
        const img=new Image();
        const idx=i;
        img.onload=()=>{
          const c2=document.createElement('canvas');
          c2.width=img.naturalWidth; c2.height=img.naturalHeight;
          c2.getContext('2d').drawImage(img,0,0);
          const stripped=stripWhiteBG(c2);
          const cropped=autocrop(stripped,6);
          const targetH=140, sc2=targetH/cropped.height;
          const SW=Math.round(cropped.width*sc2), SH=Math.round(cropped.height*sc2);
          const sc=document.createElement('canvas'); sc.width=SW; sc.height=SH;
          const scc=sc.getContext('2d'); scc.imageSmoothingEnabled=false;
          scc.drawImage(cropped,0,0,SW,SH);
          sps[idx]={frames:[sc,sc,sc,sc],idle:sc,SW,SH,isReal:true};
          count++;
          if(count===5) res(sps);
        };
        img.onerror=()=>{
          count++;
          if(count===5){
            // Check if any loaded
            if(sps.some(s=>s!==null)){
              for(let j=0;j<5;j++) if(!sps[j]) sps[j]=makeProceduralSprite(AGENT_DEFS[j]);
              res(sps);
            } else {
              tryStrip();
            }
          }
        };
        img.src=`agent_${i}.png`;
      }
    }
    // Fallback: try characters.png and slice in JS
    function tryStrip(){
      const img=new Image();
      img.onload=()=>{
        for(let i=0;i<5;i++) sps[i]=makeRealSprite(img,i,5);
        res(sps);
      };
      img.onerror=()=>{
        for(let i=0;i<5;i++) sps[i]=makeProceduralSprite(AGENT_DEFS[i]);
        res(sps);
      };
      img.src='characters.png';
    }
    tryPresliced();
  });
}

/* ═══════════════════════════════════════════
   FX RENDERING
═══════════════════════════════════════════ */
function drawFire(ctx, T){
  const fx=FIRE.cx, fy=FIRE.cy+35;
  function flameLayer(ox,w,h,col,ph){
    const wobx=Math.sin(T*3.1+ph)*w*0.25;
    ctx.globalCompositeOperation='lighter';
    const fg=ctx.createRadialGradient(fx+wobx,fy,0,fx,fy-h,w);
    fg.addColorStop(0,'rgba(255,255,200,0.9)');
    fg.addColorStop(0.25,col);
    fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg;
    ctx.beginPath();
    ctx.moveTo(fx-w+wobx,fy);
    ctx.quadraticCurveTo(fx-w*0.3,fy-h*0.5+Math.sin(T*2+ph)*10, fx+wobx*0.4,fy-h);
    ctx.quadraticCurveTo(fx+w*0.3,fy-h*0.5-Math.sin(T*2.3+ph)*8, fx+w+wobx,fy);
    ctx.fill();
    ctx.globalCompositeOperation='source-over';
  }
  flameLayer(0,50,130,'rgba(255,60,0,0.7)',0);
  flameLayer(-4,32,100,'rgba(255,160,0,0.75)',1.2);
  flameLayer(6,22,75,'rgba(255,240,100,0.85)',2.5);
  // Fire glow on scene
  const rg=ctx.createRadialGradient(fx,fy,0,fx,fy,240);
  rg.addColorStop(0,'rgba(255,110,20,0.14)'); rg.addColorStop(1,'transparent');
  ctx.globalCompositeOperation='lighter';
  ctx.fillStyle=rg; ctx.fillRect(0,580,420,500);
  ctx.globalCompositeOperation='source-over';
}

function drawRuneFX(ctx, T){
  const {cx,cy,rx,ry}=RUNE;
  const pulse=0.55+0.45*Math.sin(T*1.6);
  // Under-floor glow
  ctx.globalCompositeOperation='lighter';
  const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,rx*1.5);
  rg.addColorStop(0,`rgba(0,200,220,${0.12*pulse})`);
  rg.addColorStop(0.5,`rgba(0,160,200,${0.07*pulse})`);
  rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg; ctx.beginPath(); ctx.ellipse(cx,cy,rx*1.5,ry*1.5,0,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation='source-over';

  // Rotating outer ring
  ctx.save(); ctx.translate(cx,cy); ctx.scale(1,ry/rx);
  ctx.rotate(T*0.35);
  ctx.strokeStyle=`rgba(0,220,240,${0.3*pulse})`; ctx.lineWidth=2;
  ctx.setLineDash([22,14]);
  ctx.beginPath(); ctx.arc(0,0,rx*0.96,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // Rune ring sparkles
  for(const sp of runeRing){
    const a=sp.ph+T*0.7;
    const sx=cx+Math.cos(a)*rx*0.92, sy2=cy+Math.sin(a)*ry*0.92;
    const sa=(0.4+0.6*Math.sin(T*2.5+sp.ph*5))*pulse;
    ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=sa;
    const sg=ctx.createRadialGradient(sx,sy2,0,sx,sy2,7);
    sg.addColorStop(0,'rgba(0,240,255,1)'); sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy2,7,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  }
  // Light cone upward
  ctx.globalCompositeOperation='lighter';
  const cg=ctx.createLinearGradient(cx,cy,cx,cy-380);
  cg.addColorStop(0,`rgba(0,200,230,${0.14*pulse})`); cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;
  ctx.beginPath(); ctx.moveTo(cx-rx*0.35,cy); ctx.lineTo(cx-90,cy-380); ctx.lineTo(cx+90,cy-380); ctx.lineTo(cx+rx*0.35,cy); ctx.closePath(); ctx.fill();
  ctx.globalCompositeOperation='source-over';
}

function drawMushroomFX(ctx, T){
  const pts=[[450,660],[360,680],[520,650],[580,670],[80,120],[180,80],[320,100],[1050,90],[1200,60],[1380,95],[1750,85]];
  for(let i=0;i<pts.length;i++){
    const [mx,my]=pts[i];
    const p=0.65+0.35*Math.sin(T*1.4+i*0.8);
    ctx.globalCompositeOperation='lighter';
    const g=ctx.createRadialGradient(mx,my,0,mx,my,55);
    g.addColorStop(0,`rgba(0,240,200,${0.14*p})`); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(mx,my,55,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='source-over';
  }
}

function drawLanternFX(ctx, T){
  for(let i=0;i<5;i++){
    const lx=[380,760,1160,1550,1840][i], ly=[240,200,175,220,195][i];
    const f=0.75+0.25*Math.sin(T*6.8+i*1.9)*Math.sin(T*4.2+i*0.7);
    ctx.globalCompositeOperation='lighter';
    const g=ctx.createRadialGradient(lx,ly,0,lx,ly,130);
    g.addColorStop(0,`rgba(255,185,65,${0.18*f})`);
    g.addColorStop(0.5,`rgba(255,145,30,${0.07*f})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(lx,ly,130,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='source-over';
  }
}

function drawForgeFX(ctx, T, on){
  if(!on) return;
  const fx=STA.BENCH.x, fy=STA.BENCH.y-40;
  const p=0.55+0.45*Math.sin(T*3.3);
  ctx.globalCompositeOperation='lighter';
  const g=ctx.createRadialGradient(fx,fy,0,fx,fy,100);
  g.addColorStop(0,`rgba(255,130,20,${0.28*p})`); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(fx,fy,100,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation='source-over';
}

function drawVignette(ctx){
  const vg=ctx.createRadialGradient(DW/2,DH/2,DH*0.28,DW/2,DH*0.55,DW*0.76);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(0,0,0,0.76)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,DW,DH);
}
// Grain is expensive every frame at full res — use a pre-baked 512x512 tile
const grainCanvas=document.createElement('canvas'); grainCanvas.width=512; grainCanvas.height=512;
(function bakeGrain(){
  const gc=grainCanvas.getContext('2d');
  const id=gc.createImageData(512,512); const d=id.data;
  for(let i=0;i<d.length;i+=4){d[i]=d[i+1]=d[i+2]=128+(Math.random()*2-1)*28;d[i+3]=16;}
  gc.putImageData(id,0,0);
})();
function drawGrain(ctx){
  ctx.globalAlpha=1;
  ctx.drawImage(grainCanvas,0,0,DW,DH);
}

/* ═══════════════════════════════════════════
   INTERACTION
═══════════════════════════════════════════ */
let dragged=null, dragStart={x:0,y:0,t:0}, selectedAgent=null;
function worldXY(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)/_scale,y:(e.clientY-r.top)/_scale};}
function hitTest(x,y){for(let i=agents.length-1;i>=0;i--){const a=agents[i];if(dist({x,y},a)<36)return a;}return null;}

canvas.addEventListener('pointerdown',e=>{
  const {x,y}=worldXY(e);
  const a=hitTest(x,y);
  if(a){dragged=a;dragStart={x,y,t:performance.now()};a._prevState=a.state;a.state='dragged';canvas.setPointerCapture(e.pointerId);}
});
canvas.addEventListener('pointermove',e=>{
  if(!dragged)return;
  const{x,y}=worldXY(e);dragged.x=x;dragged.y=Math.max(FLOOR_TOP,Math.min(FLOOR_BOT,y));
});
canvas.addEventListener('pointerup',e=>{
  if(!dragged)return;
  const{x,y}=worldXY(e);
  const elapsed=performance.now()-dragStart.t;
  const moved=dist({x,y},dragStart);
  if(elapsed<220&&moved<5){openCard(dragged);}
  dragged.x=x;dragged.y=Math.max(FLOOR_TOP,Math.min(FLOOR_BOT,y));
  dragged.tx=dragged.x;dragged.ty=dragged.y;
  dragged.state='working';dragged.stT=Math.random()*4+2;
  dragged=null;
});

/* ═══════════════════════════════════════════
   CARD UI
═══════════════════════════════════════════ */
const card=document.getElementById('card');
const cc=document.getElementById('card-content');
document.getElementById('card-x').onclick=()=>{card.style.display='none';selectedAgent=null;};

function openCard(a){selectedAgent=a;card.style.display='block';renderCard(a);}
function renderCard(a){
  if(!a||card.style.display==='none')return;
  const d=a.def,ac=d.accent;
  const sm={working:'WORKING',walking:'IN TRANSIT',drinking:'RESTING',chatting:'SOCIALISING',dragged:'DISPLACED'};
  const sc={working:'#4ade80',walking:'#60a5fa',drinking:'#c084fc',chatting:'#fb923c',dragged:'#f472b6'};
  const s=a.state,sv=sm[s]||s.toUpperCase(),scc=sc[s]||'#888';
  cc.innerHTML=`
<div class="c-head">
  <div class="c-av" style="border-color:${ac};background:${d.c1}30">
    <span style="font-size:30px;line-height:1">${d.emoji}</span>
  </div>
  <div>
    <div class="c-nm">${d.name}</div>
    <div class="c-rl">${d.role}</div>
    <span class="chip" style="color:${scc};border-color:${scc}40;background:${scc}14">
      <span style="width:7px;height:7px;border-radius:50%;background:${scc};display:inline-block;box-shadow:0 0 6px ${scc}"></span>
      ${sv}
    </span>
  </div>
</div>
<div class="stats">
  <div class="stat"><div class="sv" style="color:${ac}">${a.uptime}</div><div class="sl">Uptime</div></div>
  <div class="stat"><div class="sv" style="color:${ac}">${a.completed}</div><div class="sl">Completed</div></div>
  <div class="stat"><div class="sv" style="color:${ac}">${a.queued.length}</div><div class="sl">Queue</div></div>
</div>
<div class="tsec">
  <div class="th">In Progress</div>
  ${a.active.map((tk,i)=>`
  <div class="ti ta" style="border-left-color:${ac}">
    ${tk}
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
      <div class="pb" style="flex:1"><div class="pf" style="width:${a.prog[i]||2}%;background:linear-gradient(90deg,${ac}88,${ac})"></div></div>
      <span class="pct" style="color:${ac};font-size:9px;font-weight:700">${Math.floor(a.prog[i]||0)}%</span>
    </div>
  </div>`).join('')}
</div>
<div class="tsec">
  <div class="th">Queued</div>
  ${a.queued.slice(0,2).map(tk=>`<div class="ti tq">${tk}</div>`).join('')}
</div>
<div class="tsec">
  <div class="th">Recently Completed</div>
  ${a.done.slice(0,3).map(tk=>`<div class="ti td">${tk}</div>`).join('')}
</div>`;
}

/* ═══════════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════════ */
let agents=[];
let last=0,T=0;

function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-last)/1000,0.05);
  last=now; T+=dt;

  for(const a of agents) a.update(dt,agents,T);
  for(const p of embers)  p.update(dt,T);
  for(const p of fireflies)p.update(dt,T);
  for(const p of dust)    p.update(dt,T);
  for(const p of runeRing)p.update(dt,T);
  const rex=agents[4];
  if(rex&&rex.state==='working') for(const p of sparks) p.update(dt,T);

  ctx.clearRect(0,0,DW,DH);
  // Background
  if(bgReady) ctx.drawImage(bgOff,0,0);

  // FX (behind sprites)
  drawLanternFX(ctx,T);
  drawMushroomFX(ctx,T);
  drawRuneFX(ctx,T);
  drawForgeFX(ctx,T,rex&&rex.state==='working');
  drawFire(ctx,T);
  for(const p of embers) p.draw(ctx,T);
  for(const p of dust)   p.draw(ctx,T);

  // Sprites sorted by depth
  const sorted=[...agents].sort((a,b)=>a.y-b.y);
  for(const a of sorted) a.draw(ctx,T);

  if(rex&&rex.state==='working') for(const p of sparks) p.draw(ctx,T);
  for(const p of fireflies) p.draw(ctx,T);

  // Post FX
  drawVignette(ctx);
  drawGrain(ctx);

  if(selectedAgent) renderCard(selectedAgent);
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
(async()=>{
  const setProgress=p=>document.getElementById('loading-fill').style.width=p+'%';
  const setTxt=t=>document.getElementById('loading-txt').textContent=t;

  setTxt('LOADING SANCTUM'); setProgress(10);
  await loadBG(); setProgress(45);

  setTxt('SUMMONING AGENTS'); setProgress(55);
  const sps=await loadSprites(); setProgress(85);

  agents=AGENT_DEFS.map((def,i)=>new Agent(def,sps[i]));
  // Stagger starting positions so they don't all overlap
  agents.forEach(a=>{ a.stT=Math.random()*6+1; });

  setProgress(100); setTxt('OPENING THE GATES');
  await new Promise(r=>setTimeout(r,400));
  document.getElementById('loading').style.transition='opacity 0.6s';
  document.getElementById('loading').style.opacity='0';
  setTimeout(()=>document.getElementById('loading').remove(),700);

  last=performance.now();
  requestAnimationFrame(loop);
})();
</script>
